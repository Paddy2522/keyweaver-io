<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="/images/favicon.svg" type="image/svg+xml" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="/css/cookie-consent.css" />
  <script src="/js/cookie-consent.js"></script>

<link rel="stylesheet" href="/css/nav-brand.css" />
  <link rel="stylesheet" href="/css/chrome.css" />
  <link rel="stylesheet" href="/css/help-widget.css" />
  <title>Reset password - Cuemark by Keyweaver</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink: #0A0A0F; --surface: #13131A; --edge: #2A2A3D;
      --accent: #5B6BF8; --accent2: #7B8BFF; --text: #E8E8F0; --muted: #6B6B88;
      --danger: #E24B4A; --success: #4CAF83;
    }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--ink); color: var(--text);
      min-height: 100vh; display: flex; flex-direction: column;
    }
    nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 2rem; height: 56px; border-bottom: 1px solid var(--edge);
    }
    .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--text); }
    .nav-link { font-size: 13px; color: var(--muted); text-decoration: none; }
    .nav-link:hover { color: var(--text); }
    main {
      flex: 1; display: flex; align-items: center; justify-content: center; padding: 3rem 1.5rem;
    }
    .auth-card { width: 100%; max-width: 400px; }
    .auth-header { margin-bottom: 2rem; text-align: center; }
    .auth-header h1 {
      font-family: 'Syne', sans-serif; font-size: 1.75rem; font-weight: 700;
      letter-spacing: -0.02em; margin-bottom: 0.5rem;
    }
    .auth-header p { font-size: 14px; color: var(--muted); line-height: 1.6; }
    label { display: block; font-size: 13px; font-weight: 500; color: var(--muted); margin-bottom: 6px; }
    input[type="password"] {
      width: 100%; height: 44px; background: var(--surface);
      border: 1px solid var(--edge); border-radius: 8px;
      padding: 0 12px; font-size: 14px; color: var(--text); outline: none;
    }
    input:focus { border-color: var(--accent); }
    .form-group { margin-bottom: 1rem; }
    .btn-submit {
      width: 100%; height: 44px; background: var(--accent); color: #fff;
      border: none; border-radius: 8px; font-size: 14px; font-weight: 500;
      cursor: pointer; margin-top: 0.5rem;
    }
    .btn-submit:hover { background: var(--accent2); }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }
    .alert {
      display: none; padding: 12px 14px; border-radius: 8px;
      font-size: 13px; margin-bottom: 1rem; line-height: 1.5;
    }
    .alert.error { display: block; background: rgba(226,75,74,0.1); border: 1px solid rgba(226,75,74,0.3); color: #f0a0a0; }
    .alert.success { display: block; background: rgba(76,175,131,0.1); border: 1px solid rgba(76,175,131,0.3); color: var(--success); }
    .cuemark-turnstile-wrap { margin: 0.5rem 0 1rem; min-height: 68px; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="nav-logo" aria-label="Keyweaver">
    <img src="/images/keyweaver-logo.svg" alt="" class="nav-logo-img" width="162" height="28" />
  </a>
  <a href="/login" class="nav-link">Back to sign in</a>
</nav>

<main>
  <div class="auth-card">
    <div class="auth-header">
      <h1>Choose a new password</h1>
      <p>Use at least 8 characters. After saving, sign in with your new password.</p>
    </div>

    <div id="alert" class="alert"></div>

    <form id="reset-form" novalidate>
      <div class="form-group">
        <label for="password">New password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="new-password" required minlength="8" />
      </div>
      <div class="form-group">
        <label for="password-confirm">Confirm password</label>
        <input type="password" id="password-confirm" placeholder="••••••••" autocomplete="new-password" required minlength="8" />
      </div>
      <div class="cuemark-turnstile-wrap" id="reset-turnstile-wrap">
        <div id="reset-turnstile"></div>
      </div>
      <button type="submit" class="btn-submit" id="submit-btn">Save new password</button>
    </form>
  </div>
</main>

<script src="/js/cuemark-turnstile.js"></script>
<script>
  const BACKEND = 'https://keyweaver-backend.vercel.app';
  const token = new URLSearchParams(window.location.search).get('token');

  if (window.CuemarkTurnstile) {
    CuemarkTurnstile.prepare('reset-turnstile-wrap', 'reset-turnstile').catch(function () {});
  }

  function showAlert(msg, type) {
    const el = document.getElementById('alert');
    el.textContent = msg;
    el.className = 'alert ' + type;
  }

  if (!token) {
    showAlert('This reset link is invalid. Request a new one from the forgot password page.', 'error');
    document.getElementById('reset-form').style.display = 'none';
  }

  document.getElementById('reset-form').addEventListener('submit', async (e) => {
    e.preventDefault();

    if (!token) {
      showAlert('This reset link is invalid. Request a new one.', 'error');
      return;
    }

    const password = document.getElementById('password').value;
    const confirm = document.getElementById('password-confirm').value;

    if (password.length < 8) {
      showAlert('Password must be at least 8 characters.', 'error');
      return;
    }
    if (password !== confirm) {
      showAlert('Passwords do not match.', 'error');
      return;
    }

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = 'Saving…';

    let turnstileToken = '';
    try {
      if (window.CuemarkTurnstile) {
        turnstileToken = await CuemarkTurnstile.requireToken('reset-turnstile');
      }
    } catch (err) {
      showAlert(err.message || 'Please complete the security check.', 'error');
      btn.disabled = false;
      btn.textContent = 'Save new password';
      return;
    }

    try {
      const res = await fetch(BACKEND + '/api/captio/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          token,
          new_password: password,
          turnstile_token: turnstileToken || undefined
        })
      });

      const data = await res.json().catch(() => ({}));

      if (!res.ok) {
        showAlert(data.error || 'Could not reset password. Try requesting a new link.', 'error');
        if (window.CuemarkTurnstile) CuemarkTurnstile.reset('reset-turnstile');
        btn.disabled = false;
        btn.textContent = 'Save new password';
        return;
      }

      window.location.href = '/login?reset=1';
    } catch {
      showAlert('Could not reach the server. Please try again.', 'error');
      btn.disabled = false;
      btn.textContent = 'Save new password';
    }
  });
</script>
<script src="/js/help-widget.js" defer></script>
</body>
</html>
