name: Build Keyweaver Mac Manager

# Builds, signs, and notarizes Keyweaver-Manager.pkg on a GitHub-hosted macOS runner.
# No personal Mac required once Apple secrets are configured.
# Guide: mac-docs/APPLE_MAC_SIGNING_SETUP.md

on:
  workflow_dispatch:
    inputs:
      version:
        description: Manager pkg version
        required: true
        default: '1.0.0'

jobs:
  build:
    runs-on: macos-15
    # First Apple notarizations can sit In Progress for >1h; keep headroom.
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Import Developer ID certificates
        env:
          APPLE_APP_P12: ${{ secrets.APPLE_APP_P12 }}
          APPLE_INSTALLER_P12: ${{ secrets.APPLE_INSTALLER_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${APPLE_APP_P12:-}" ] || [ -z "${APPLE_INSTALLER_P12:-}" ]; then
            echo "Certificate secrets missing."
            exit 1
          fi

          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"
          KEYCHAIN_PATH="$RUNNER_TEMP/keyweaver.keychain-db"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Apple intermediate CAs (helps codesign find a full chain)
          curl -fsSL -o "$RUNNER_TEMP/DeveloperIDG2CA.cer" \
            https://www.apple.com/certificateauthority/DeveloperIDG2CA.cer
          curl -fsSL -o "$RUNNER_TEMP/AppleWWDRCAG3.cer" \
            https://www.apple.com/certificateauthority/AppleWWDRCAG3.cer
          security import "$RUNNER_TEMP/DeveloperIDG2CA.cer" -k "$KEYCHAIN_PATH" -T /usr/bin/codesign -T /usr/bin/productsign || true
          security import "$RUNNER_TEMP/AppleWWDRCAG3.cer" -k "$KEYCHAIN_PATH" -T /usr/bin/codesign -T /usr/bin/productsign || true

          APP_P12="$RUNNER_TEMP/app.p12"
          INST_P12="$RUNNER_TEMP/installer.p12"
          echo "$APPLE_APP_P12" | base64 --decode > "$APP_P12"
          echo "$APPLE_INSTALLER_P12" | base64 --decode > "$INST_P12"

          security import "$APP_P12" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security import "$INST_P12" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"

          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain
          security set-key-partition-list -S apple-tool:,apple:,codesign:,productsign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          # Persist for later steps (codesign / productsign)
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> "$GITHUB_ENV"

      - name: Build Manager.app
        run: |
          chmod +x scripts/build-keyweaver-mac-manager.sh
          ./scripts/build-keyweaver-mac-manager.sh "${{ inputs.version }}"

      - name: Package and sign
        env:
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          set -euo pipefail
          if [ -z "${APPLE_API_KEY_P8:-}" ] || [ -z "${APPLE_API_KEY_ID:-}" ] || [ -z "${APPLE_API_ISSUER_ID:-}" ]; then
            echo "Notary API secrets missing (APPLE_API_KEY_P8 / KEY_ID / ISSUER_ID)."
            exit 1
          fi

          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain

          KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          printf '%s' "$APPLE_API_KEY_P8" | tr -d '\r' > "$KEY_PATH"
          chmod 600 "$KEY_PATH"
          echo "NOTARY_KEY=$KEY_PATH" >> "$GITHUB_ENV"
          echo "NOTARY_KEY_ID=$APPLE_API_KEY_ID" >> "$GITHUB_ENV"
          echo "NOTARY_ISSUER=$APPLE_API_ISSUER_ID" >> "$GITHUB_ENV"

          chmod +x scripts/package-keyweaver-mac-manager.sh
          export APP_IDENTITY='Developer ID Application: Keyweaver Limited (4M29F3JH68)'
          export INSTALLER_IDENTITY='Developer ID Installer: Keyweaver Limited (4M29F3JH68)'
          # Sign+pkg only; notarize in next step so we can artifact the pkg first
          SKIP_NOTARIZE=1 ./scripts/package-keyweaver-mac-manager.sh "${{ inputs.version }}"

      - name: Upload signed pkg (pre-staple)
        uses: actions/upload-artifact@v4
        with:
          name: Keyweaver-Manager-${{ inputs.version }}-signed
          path: dist/keyweaver-mac-manager/Keyweaver-Manager-*.pkg
          if-no-files-found: error

      - name: Notarize and staple
        run: |
          set -euo pipefail
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          PKG="dist/keyweaver-mac-manager/Keyweaver-Manager-${{ inputs.version }}.pkg"
          echo "Submitting $PKG for notarization…"
          # Cap wait below job timeout so we fail with a clear message instead of a hard cancel
          xcrun notarytool submit "$PKG" \
            --key "$NOTARY_KEY" \
            --key-id "$NOTARY_KEY_ID" \
            --issuer "$NOTARY_ISSUER" \
            --wait \
            --timeout 150m
          xcrun stapler staple "$PKG"
          xcrun stapler validate "$PKG"
          echo "Notarized and stapled: $PKG"

      - name: Upload notarized pkg
        uses: actions/upload-artifact@v4
        with:
          name: Keyweaver-Manager-${{ inputs.version }}
          path: dist/keyweaver-mac-manager/Keyweaver-Manager-*.pkg
          if-no-files-found: error
