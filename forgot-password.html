<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="/images/favicon.svg" type="image/svg+xml" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="/css/nav-brand.css" />
  <link rel="stylesheet" href="/css/chrome.css" />
  <link rel="stylesheet" href="/css/help-widget.css" />
  <title>Forgot password — Cuemark by Keyweaver</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink: #0A0A0F; --surface: #13131A; --edge: #2A2A3D;
      --accent: #5B6BF8; --accent2: #7B8BFF; --text: #E8E8F0; --muted: #6B6B88;
      --danger: #E24B4A; --success: #4CAF83;
    }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--ink); color: var(--text);
      min-height: 100vh; display: flex; flex-direction: column;
    }
    nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 2rem; height: 56px; border-bottom: 1px solid var(--edge);
    }
    .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--text); }
    .nav-link { font-size: 13px; color: var(--muted); text-decoration: none; }
    .nav-link:hover { color: var(--text); }
    main {
      flex: 1; display: flex; align-items: center; justify-content: center; padding: 3rem 1.5rem;
    }
    .auth-card { width: 100%; max-width: 400px; }
    .auth-header { margin-bottom: 2rem; text-align: center; }
    .auth-header h1 {
      font-family: 'Syne', sans-serif; font-size: 1.75rem; font-weight: 700;
      letter-spacing: -0.02em; margin-bottom: 0.5rem;
    }
    .auth-header p { font-size: 14px; color: var(--muted); line-height: 1.6; }
    .auth-header a { color: var(--accent2); text-decoration: none; }
    label { display: block; font-size: 13px; font-weight: 500; color: var(--muted); margin-bottom: 6px; }
    input[type="email"] {
      width: 100%; height: 44px; background: var(--surface);
      border: 1px solid var(--edge); border-radius: 8px;
      padding: 0 12px; font-size: 14px; color: var(--text); outline: none;
    }
    input:focus { border-color: var(--accent); }
    .form-group { margin-bottom: 1rem; }
    .btn-submit {
      width: 100%; height: 44px; background: var(--accent); color: #fff;
      border: none; border-radius: 8px; font-size: 14px; font-weight: 500;
      cursor: pointer; margin-top: 0.5rem;
    }
    .btn-submit:hover { background: var(--accent2); }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }
    .alert {
      display: none; padding: 12px 14px; border-radius: 8px;
      font-size: 13px; margin-bottom: 1rem; line-height: 1.5;
    }
    .alert.error { display: block; background: rgba(226,75,74,0.1); border: 1px solid rgba(226,75,74,0.3); color: #f0a0a0; }
    .alert.success { display: block; background: rgba(76,175,131,0.1); border: 1px solid rgba(76,175,131,0.3); color: var(--success); }
    .alert.info { display: block; background: rgba(91,107,248,0.1); border: 1px solid rgba(91,107,248,0.25); color: var(--accent2); }
    .cuemark-turnstile-wrap { margin: 0.5rem 0 1rem; min-height: 68px; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="nav-logo" aria-label="Cuemark by Keyweaver">
    <img src="/images/cuemark-logo.svg" alt="" class="nav-logo-img" width="327" height="28" />
  </a>
  <a href="/login" class="nav-link">Back to sign in</a>
</nav>

<main>
  <div class="auth-card">
    <div class="auth-header">
      <h1>Forgot your password?</h1>
      <p>Enter your account email and we&apos;ll send a link to reset your password. The link expires in 1 hour.</p>
    </div>

    <div id="alert" class="alert"></div>

    <form id="reset-form" novalidate>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required />
      </div>
      <div class="cuemark-turnstile-wrap" id="forgot-turnstile-wrap">
        <div id="forgot-turnstile"></div>
      </div>
      <button type="submit" class="btn-submit" id="submit-btn">Send reset link</button>
    </form>

    <p style="margin-top:1.25rem;font-size:13px;color:var(--muted);line-height:1.6;text-align:center;">
      Check junk or spam if nothing arrives within a few minutes.
    </p>

    <p style="margin-top:1.25rem; text-align:center; font-size:13px; color:var(--muted);">
      Prefer signing in without a password? <a href="/login" style="color:var(--accent2);">Use a sign-in link</a>
    </p>
  </div>
</main>

<script src="/js/cuemark-turnstile.js"></script>
<script>
  const BACKEND = 'https://keyweaver-backend.vercel.app';

  if (window.CuemarkTurnstile) {
    CuemarkTurnstile.prepare('forgot-turnstile-wrap', 'forgot-turnstile').catch(function () {});
  }

  function showAlert(msg, type) {
    const el = document.getElementById('alert');
    el.textContent = msg;
    el.className = 'alert ' + type;
  }

  document.getElementById('reset-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    if (!email) {
      showAlert('Please enter your email address.', 'error');
      return;
    }

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = 'Sending…';

    let turnstileToken = '';
    try {
      if (window.CuemarkTurnstile) {
        turnstileToken = await CuemarkTurnstile.requireToken('forgot-turnstile');
      }
    } catch (err) {
      showAlert(err.message || 'Please complete the security check.', 'error');
      btn.disabled = false;
      btn.textContent = 'Send reset link';
      return;
    }

    try {
      const res = await fetch(BACKEND + '/api/captio/forgot-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, turnstile_token: turnstileToken || undefined })
      });

      if (!res.ok) {
        const data = await res.json().catch(() => ({}));
        showAlert(data.error || 'Something went wrong. Try again.', 'error');
        if (window.CuemarkTurnstile) CuemarkTurnstile.reset('forgot-turnstile');
      } else {
        showAlert('If an account exists for that email, we sent a password reset link. Check your inbox and junk or spam folder.', 'success');
        document.getElementById('reset-form').style.display = 'none';
      }
    } catch {
      showAlert('Could not reach the server. Please try again.', 'error');
    }

    btn.disabled = false;
    btn.textContent = 'Send reset link';
  });
</script>
<script src="/js/help-widget.js" defer></script>
</body>
</html>
