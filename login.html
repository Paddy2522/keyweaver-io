<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="/images/favicon.svg" type="image/svg+xml" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="/css/nav-brand.css" />
  <link rel="stylesheet" href="/css/chrome.css" />
  <link rel="stylesheet" href="/css/help-widget.css" />
  <title>Sign in — Cuemark by Keyweaver</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:     #0A0A0F;
      --surface: #13131A;
      --lift:    #1C1C28;
      --edge:    #2A2A3D;
      --accent:  #5B6BF8;
      --accent2: #7B8BFF;
      --text:    #E8E8F0;
      --muted:   #6B6B88;
      --subtle:  #3A3A52;
      --danger:  #E24B4A;
      --success: #4CAF83;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--ink);
      color: var(--text);
      min-height: 100vh;
      display: flex; flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    /* NAV */
    nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 2rem; height: 56px;
      border-bottom: 1px solid var(--edge);
    }
    .nav-logo {
      display: flex; align-items: center; gap: 10px;
      text-decoration: none;
    }

.nav-link {
      font-size: 13px; color: var(--muted); text-decoration: none;
    }
    .nav-link:hover { color: var(--text); }

    /* MAIN */
    main {
      flex: 1; display: flex;
      align-items: center; justify-content: center;
      padding: 3rem 1.5rem;
    }

    .auth-card {
      width: 100%; max-width: 400px;
    }

    .auth-header { margin-bottom: 2rem; text-align: center; }
    .auth-header h1 {
      font-family: 'Syne', sans-serif;
      font-size: 1.75rem; font-weight: 700;
      letter-spacing: -0.02em; color: var(--text);
      margin-bottom: 0.5rem;
    }
    .auth-header p { font-size: 14px; color: var(--muted); }
    .auth-header a { color: var(--accent2); text-decoration: none; }
    .auth-header a:hover { text-decoration: underline; }

    /* FORM */
    .form-group { margin-bottom: 1rem; }

    label {
      display: block;
      font-size: 13px; font-weight: 500;
      color: var(--muted); margin-bottom: 6px;
    }

    input[type="email"],
    input[type="password"],
    input[type="text"] {
      width: 100%; height: 44px;
      background: var(--surface);
      border: 1px solid var(--edge);
      border-radius: 8px;
      padding: 0 12px;
      font-family: 'Inter', sans-serif;
      font-size: 14px; color: var(--text);
      outline: none;
      transition: border-color 0.15s;
      -webkit-appearance: none;
    }
    input::placeholder { color: var(--muted); }
    input:focus { border-color: var(--accent); }
    input.error { border-color: var(--danger); }

    .input-row {
      display: flex; align-items: center;
      position: relative;
    }
    .input-row input { padding-right: 44px; }
    .toggle-pw {
      position: absolute; right: 12px;
      background: none; border: none; cursor: pointer;
      color: var(--muted); padding: 0;
      display: flex; align-items: center;
    }
    .toggle-pw:hover { color: var(--text); }
    .toggle-pw svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }

    .form-footer-row {
      display: flex; align-items: center;
      justify-content: space-between;
      margin-bottom: 1.25rem;
    }
    .remember-label {
      display: flex; align-items: center; gap: 8px;
      font-size: 13px; color: var(--muted); cursor: pointer;
      margin: 0;
    }
    input[type="checkbox"] {
      width: 16px; height: 16px;
      accent-color: var(--accent);
      cursor: pointer;
    }
    .forgot-link {
      font-size: 13px; color: var(--muted);
      text-decoration: none;
    }
    .forgot-link:hover { color: var(--text); }

    .btn-submit {
      width: 100%; height: 44px;
      background: var(--accent); color: #fff;
      border: none; border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 14px; font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-submit:hover { background: var(--accent2); }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* DIVIDER */
    .or-divider {
      display: flex; align-items: center; gap: 12px;
      margin: 1.5rem 0;
    }
    .or-divider::before,
    .or-divider::after {
      content: ''; flex: 1;
      height: 1px; background: var(--edge);
    }
    .or-divider span {
      font-size: 12px; color: var(--muted);
      white-space: nowrap;
    }

    /* MAGIC LINK */
    .cuemark-turnstile-wrap {
      margin: 0 0 1rem;
      min-height: 68px;
    }

    .btn-magic {
      width: 100%; height: 44px;
      background: var(--lift); color: var(--text);
      border: 1px solid var(--edge); border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 14px; font-weight: 500;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-magic:hover { border-color: var(--subtle); background: var(--surface); }
    .btn-magic svg { width: 17px; height: 17px; stroke: var(--muted); fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }

    /* ALERT */
    .alert {
      border-radius: 8px; padding: 10px 14px;
      font-size: 13px; margin-bottom: 1rem;
      display: none;
    }
    .alert.error {
      background: rgba(226,75,74,0.1);
      border: 1px solid rgba(226,75,74,0.3);
      color: #F09595;
      display: block;
    }
    .alert.success {
      background: rgba(76,175,131,0.1);
      border: 1px solid rgba(76,175,131,0.3);
      color: #4CAF83;
      display: block;
    }

    /* FOOTER */
    footer {
      padding: 1.5rem 2rem;
      text-align: center;
      border-top: 1px solid var(--edge);
    }
    footer p { font-size: 12px; color: var(--muted); }
    footer a { color: var(--muted); text-decoration: underline; text-underline-offset: 3px; }
  </style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo" aria-label="Cuemark by Keyweaver">
        <img src="/images/cuemark-logo.svg" alt="" class="nav-logo-img" width="327" height="28" />
  </a>
  <a href="/signup" class="nav-link">No account? Sign up →</a>
</nav>

<main>
  <div class="auth-card">
    <div class="auth-header">
      <h1>Welcome back</h1>
      <p>No account yet? <a href="/signup">Sign up free</a></p>
    </div>

    <div id="alert" class="alert"></div>

    <form id="login-form" novalidate>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" autocomplete="email" required />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-row">
          <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required />
          <button type="button" class="toggle-pw" id="toggle-pw" aria-label="Show password">
            <svg id="pw-eye" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <div class="form-footer-row">
        <a href="/forgot-password" class="forgot-link">Sign-in link</a>
      </div>

      <div class="cuemark-turnstile-wrap" id="login-turnstile-wrap">
        <div id="login-turnstile"></div>
      </div>

      <button type="submit" class="btn-submit" id="submit-btn">
        <span id="btn-label">Sign in</span>
        <div class="spinner" id="spinner"></div>
      </button>
    </form>

    <div class="or-divider"><span>or</span></div>

    <button type="button" class="btn-magic" id="magic-btn">
      <svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
      Email me a sign-in link
    </button>
    <p id="magic-sent" style="display:none;font-size:13px;color:var(--success);text-align:center;margin-top:0.75rem;line-height:1.5;">
      Check your inbox for a sign-in link. It expires in 15 minutes.
    </p>

  </div>
</main>

<footer>
  <p>By signing in you agree to our <a href="/legal/terms">Terms</a> and <a href="/legal/privacy">Privacy Policy</a>.</p>
</footer>

<script src="/js/cuemark-turnstile.js"></script>
<script>
  const BACKEND = 'https://keyweaver-backend.vercel.app';

  if (window.CuemarkTurnstile) {
    CuemarkTurnstile.prepare('login-turnstile-wrap', 'login-turnstile').catch(function () {});
  }

  function loginRedirectTarget() {
    const next = new URLSearchParams(window.location.search).get('next');
    if (!next || !next.startsWith('/') || next.startsWith('//')) return '/account';
    return next;
  }

  const loginErrors = {
    invalid_link: 'That sign-in link is invalid. Request a new one or use your password.',
    link_used: 'That sign-in link was already used. Sign in with your password instead.',
    link_expired: 'That sign-in link has expired. Sign in with your password or reset it.',
    server_error: 'Something went wrong verifying your link. Try signing in with your password.'
  };
  const errParam = new URLSearchParams(window.location.search).get('error');
  if (errParam && loginErrors[errParam]) {
    document.addEventListener('DOMContentLoaded', () => {
      showAlert(loginErrors[errParam], 'error');
    });
  }

  // Password toggle
  const pwInput = document.getElementById('password');
  const toggleBtn = document.getElementById('toggle-pw');
  toggleBtn.addEventListener('click', () => {
    const show = pwInput.type === 'password';
    pwInput.type = show ? 'text' : 'password';
    document.getElementById('pw-eye').innerHTML = show
      ? '<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>'
      : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  });

  function showAlert(msg, type) {
    const el = document.getElementById('alert');
    el.textContent = msg;
    el.className = 'alert ' + type;
  }

  function setLoading(loading) {
    const btn = document.getElementById('submit-btn');
    document.getElementById('btn-label').textContent = loading ? 'Signing in…' : 'Sign in';
    document.getElementById('spinner').style.display = loading ? 'block' : 'none';
    btn.disabled = loading;
  }

  function getBrowserFingerprint() {
    const key = 'cc_web_device_id';
    let id = localStorage.getItem(key);
    if (!id) {
      id = 'web_' + crypto.randomUUID();
      localStorage.setItem(key, id);
    }
    return id;
  }

  // Login form
  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    if (!email || !password) {
      showAlert('Please enter your email and password.', 'error');
      return;
    }

    setLoading(true);

    let turnstileToken = '';
    try {
      if (window.CuemarkTurnstile) {
        turnstileToken = await CuemarkTurnstile.requireToken('login-turnstile');
      }
    } catch (err) {
      showAlert(err.message || 'Please complete the security check.', 'error');
      setLoading(false);
      return;
    }

    try {
      const res = await fetch(BACKEND + '/api/captio/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password, turnstile_token: turnstileToken || undefined })
      });
      const data = await res.json();

      if (!res.ok) {
        showAlert(data.error || 'Incorrect email or password.', 'error');
        if (window.CuemarkTurnstile) CuemarkTurnstile.reset('login-turnstile');
        setLoading(false);
        return;
      }

      // Store token — same key the panel uses
      localStorage.setItem('cc_token', data.token);

      window.location.href = loginRedirectTarget();

    } catch (err) {
      showAlert('Could not reach the server. Please try again.', 'error');
      if (window.CuemarkTurnstile) CuemarkTurnstile.reset('login-turnstile');
      setLoading(false);
    }
  });

  // Email sign-in link (Cuemark accounts)
  document.getElementById('magic-btn').addEventListener('click', async () => {
    const email = document.getElementById('email').value.trim();
    if (!email || !/\S+@\S+\.\S+/.test(email)) {
      showAlert('Enter your email above first, then request a sign-in link.', 'error');
      return;
    }

    const btn = document.getElementById('magic-btn');
    btn.disabled = true;
    btn.textContent = 'Sending…';

    let turnstileToken = '';
    try {
      if (window.CuemarkTurnstile) {
        turnstileToken = await CuemarkTurnstile.requireToken('login-turnstile');
      }
    } catch (err) {
      showAlert(err.message || 'Please complete the security check.', 'error');
      btn.disabled = false;
      btn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg> Email me a sign-in link';
      return;
    }

    try {
      const res = await fetch(BACKEND + '/api/captio/magic-link', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, turnstile_token: turnstileToken || undefined })
      });
      if (!res.ok) {
        const data = await res.json().catch(() => ({}));
        showAlert(data.error || 'Could not send sign-in link. Try your password instead.', 'error');
        if (window.CuemarkTurnstile) CuemarkTurnstile.reset('login-turnstile');
      } else {
        document.getElementById('magic-sent').style.display = 'block';
        showAlert('', '');
        document.getElementById('alert').className = 'alert';
      }
    } catch {
      showAlert('Could not reach the server. Try again.', 'error');
    }

    btn.disabled = false;
    btn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg> Email me a sign-in link';
  });

  if (localStorage.getItem('cc_token')) {
    window.location.href = loginRedirectTarget();
  }
</script>
  <script src="/js/help-widget.js" defer></script>
</body>
</html>
